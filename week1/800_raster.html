<html>
<head>
<title>Raster Graphics</title>
</head>
<body>



<canvas id="canvas" width="200" height="200"
style="width:500px; height:500px; border:1px solid #000000; image-rendering: pixelated;">
</canvas>
<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const imageData = ctx.createImageData(canvas.width, canvas.height);
const pixels = imageData.data; // Array of color [R,G,B,A, R,G,B,A, ...]



function putPixel(x, y, r, g, b, a = 255)
{
    const idx = (y*canvas.width+x)*4
    pixels[idx] = r;
    pixels[idx+1] = g;
    pixels[idx+2] = b;
    pixels[idx+3] = a;
}

for(let i=50;i<200;i+=3){
    
    putPixel(i, i, 255, 0, 0);  
}
for(let i=51;i<200;i+=3){
    
    putPixel(i, i, 0, 255, 0);  
}
for(let i=52;i<200;i+=3){
    
    putPixel(i, i, 0, 0, 255);  
}


//
//




ctx.putImageData(imageData, 0, 0);
</script>
</body>
</html>
